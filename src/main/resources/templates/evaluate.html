<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h2>Register as Chef</h2>
    <form method="post" action="/register">
        <div>Username: <input type="text" name="username" required/></div>
        <div>Password: <input type="password" name="password" required/></div>
        <div>Full Name: <input type="text" name="fullName"/></div>
        <div>Bio: <textarea name="bio"></textarea></div>
        <div>Photo URL: <input type="text" name="photoUrl"/></div>
        <div>Join Year: <input type="number" name="joinYear"/></div>
        <button type="submit">Register</button>
    </form>
    <a href="/login">Already have an account? Login</a>
</body>
</html>
