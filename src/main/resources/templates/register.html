<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>
<h2>Register as Chef</h2>
<form method="post" action="/register" enctype="multipart/form-data">
	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div>Username: <input type="text" name="username" required/></div>
    <div>Password: <input type="password" name="password" required/></div>
    <div>Full Name: <input type="text" name="fullName"/></div>
    <div>Bio: <textarea name="bio"></textarea></div>
    <div>Join Year:
        <select name="joinYear">
            <option th:each="y : ${#numbers.sequence(1950, 2026)}" th:value="${y}" th:text="${y}"></option>
        </select>
    </div>
    <div>Profile Photo: <input type="file" name="profilePhoto" accept="image/*"/></div>
    <button type="submit">Register</button>
</form>
<a href="/login">Already have an account? Login</a>
</body>
</html>
